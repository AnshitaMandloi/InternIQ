# ---- Datasource ----
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&connectTimeout=30000&socketTimeout=30000&allowMultiQueries=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Tell Flyway to ignore version mismatch with MySQL 9.4
spring.flyway.baseline-on-migrate=true

# Skip Flyway validation (checksum issues with MySQL 9.x)
spring.flyway.validate-on-migrate=false

# Ignore future migrations warning
spring.flyway.out-of-order=true

# ---- JWT ----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ---- SerpAPI ----
app.serpapi.key=${SERPAPI_KEY}

# ---- Groq ----
groq.api.key=${GROQ_API_KEY}

# ---- Mail ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- Server ----
server.port=${PORT:8080}

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ---- Swagger ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---- Logging ----
logging.level.com.interniq=INFO