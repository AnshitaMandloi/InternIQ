spring.application.name=InternIQ
spring.profiles.active=dev

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---- JWT ----
app.jwt.secret=your-jwt-secret-key-here
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

app.serpapi.key=serpapi-key

# ---- OpenAI ----
app.openai.api-key=your-openai-key-here
app.openai.model=gpt-4o-mini
app.openai.url=https://api.openai.com/v1/chat/completions

# ---- Mail ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ---- Swagger ----
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ---- Server ----
server.port=${PORT:8080}
spring.datasource.url=jdbc:mysql://localhost:3306/interniq_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.password=YOUR_DB_PASSWORD_HERE

logging.level.com.interniq=DEBUG